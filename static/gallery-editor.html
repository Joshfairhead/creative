<meta charset="UTF-8">
<title>Gallery Editor - Eden Project</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #1a1a2e; color: #eee; padding: 20px; }
h1 { margin-bottom: 20px; text-align: center; }
.section { background: #16213e; border-radius: 8px; padding: 16px; margin-bottom: 24px; }
.section h2 { margin-bottom: 4px; font-size: 1.1em; color: #a8d8ea; }
.section .desc { font-size: 0.85em; color: #888; margin-bottom: 12px; }
.gallery-grid {
  display: flex; flex-wrap: wrap; gap: 8px; min-height: 80px;
  border: 2px dashed #333; border-radius: 6px; padding: 8px;
  transition: border-color 0.2s;
}
.gallery-grid.drag-over { border-color: #a8d8ea; background: rgba(168,216,234,0.05); }
.thumb {
  position: relative; width: 120px; height: 90px; border-radius: 4px;
  overflow: hidden; cursor: grab; transition: transform 0.15s, opacity 0.15s;
  border: 2px solid transparent;
}
.thumb:hover { border-color: #a8d8ea; }
.thumb.dragging { opacity: 0.3; transform: scale(0.95); }
.thumb img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
.thumb .delete-btn {
  position: absolute; top: 2px; right: 2px; background: rgba(255,50,50,0.85);
  color: white; border: none; border-radius: 50%; width: 20px; height: 20px;
  font-size: 12px; cursor: pointer; display: none; align-items: center;
  justify-content: center; line-height: 1;
}
.thumb:hover .delete-btn { display: flex; }
.thumb .filename {
  position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.7);
  font-size: 9px; padding: 2px 4px; white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis;
}
#trash-zone {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: #cc3333; color: white; padding: 16px 40px; border-radius: 12px;
  font-size: 1.2em; font-weight: bold; display: none; z-index: 100;
  border: 3px dashed #ff6666; transition: background 0.2s;
}
#trash-zone.drag-over { background: #ff0000; }
#export-btn {
  display: block; margin: 30px auto; padding: 14px 40px;
  background: #4CAF50; color: white; border: none; border-radius: 8px;
  font-size: 1.1em; cursor: pointer;
}
#export-btn:hover { background: #45a049; }
#export-output { display: none; white-space: pre-wrap; background: #0d1117; padding: 16px; border-radius: 8px; font-family: monospace; font-size: 12px; margin-top: 20px; max-height: 400px; overflow: auto; }
.count { color: #888; font-size: 0.85em; margin-left: 8px; }
</style>
</head>

const container = document.getElementById('sections');
const trashZone = document.getElementById('trash-zone');
let draggedEl = null;
let draggedImg = null;

function updateCounts() {
  document.querySelectorAll('.section').forEach(sec => {
    const count = sec.querySelectorAll('.thumb').length;
    sec.querySelector('.count').textContent = `(${count})`;
  });
}

function createThumb(filename) {
  const div = document.createElement('div');
  div.className = 'thumb';
  div.draggable = true;
  div.dataset.filename = filename;
  div.innerHTML = `
    <img src="${BASE}${filename}" alt="${filename}" loading="lazy" />
    <button class="delete-btn" title="Delete">&times;</button>
    <div class="filename">${filename.replace('.jpg','').replace('IMG_20260512_','')}</div>
  `;
  div.querySelector('.delete-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    div.remove();
    updateCounts();
  });
  div.addEventListener('dragstart', (e) => {
    draggedEl = div;
    draggedImg = filename;
    div.classList.add('dragging');
    trashZone.style.display = 'block';
    e.dataTransfer.effectAllowed = 'move';
  });
  div.addEventListener('dragend', () => {
    div.classList.remove('dragging');
    trashZone.style.display = 'none';
    trashZone.classList.remove('drag-over');
    draggedEl = null;
    draggedImg = null;
  });
  return div;
}

sections.forEach(sec => {
  const sectionDiv = document.createElement('div');
  sectionDiv.className = 'section';
  sectionDiv.dataset.id = sec.id;
  sectionDiv.innerHTML = `<h2>${sec.title}<span class="count">(${sec.images.length})</span></h2><p class="desc">${sec.desc}</p>`;
  const grid = document.createElement('div');
  grid.className = 'gallery-grid';
  sec.images.forEach(img => grid.appendChild(createThumb(img)));

  grid.addEventListener('dragover', (e) => {
    e.preventDefault();
    grid.classList.add('drag-over');
    const afterEl = getDragAfterElement(grid, e.clientX, e.clientY);
    if (afterEl) {
      grid.insertBefore(draggedEl, afterEl);
    } else {
      grid.appendChild(draggedEl);
    }
  });
  grid.addEventListener('dragleave', () => grid.classList.remove('drag-over'));
  grid.addEventListener('drop', (e) => {
    e.preventDefault();
    grid.classList.remove('drag-over');
    updateCounts();
  });

  sectionDiv.appendChild(grid);
  container.appendChild(sectionDiv);
});

trashZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  trashZone.classList.add('drag-over');
});
trashZone.addEventListener('dragleave', () => trashZone.classList.remove('drag-over'));
trashZone.addEventListener('drop', (e) => {
  e.preventDefault();
  if (draggedEl) { draggedEl.remove(); updateCounts(); }
  trashZone.classList.remove('drag-over');
  trashZone.style.display = 'none';
});

function getDragAfterElement(container, x, y) {
  const elements = [...container.querySelectorAll('.thumb:not(.dragging)')];
  return elements.reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    const offsetX = x - box.left - box.width / 2;
    const offsetY = y - box.top - box.height / 2;
    const offset = Math.sqrt(offsetX * offsetX + offsetY * offsetY);
    if (offset < closest.offset) {
      return { offset, element: child };
    }
    return closest;
  }, { offset: Number.POSITIVE_INFINITY }).element;
}

document.getElementById('export-btn').addEventListener('click', () => {
  const result = {};
  document.querySelectorAll('.section').forEach(sec => {
    const id = sec.dataset.id;
    const imgs = [...sec.querySelectorAll('.thumb')].map(t => t.dataset.filename);
    result[id] = imgs;
  });
  const output = document.getElementById('export-output');
  output.style.display = 'block';
  output.textContent = JSON.stringify(result, null, 2);
  console.log('GALLERY_EXPORT:' + JSON.stringify(result));
});
</script>
